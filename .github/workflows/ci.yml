name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages and API
        run: npm run build

      - name: Type-check mobile
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json

      - name: Run tests
        run: npm test
